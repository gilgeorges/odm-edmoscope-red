name: Deploy Catalogue to GitHub Pages

on:
  push:
    branches: [main, claude/edmoscope-ui-library-6GFaG]
    paths:
      - "edmoscope-ui/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: edmoscope-ui/package.json

      - name: Install dependencies
        working-directory: edmoscope-ui
        run: npm install

      - name: Build catalogue
        working-directory: edmoscope-ui
        run: npm run build:catalogue

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: edmoscope-ui/catalogue/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
